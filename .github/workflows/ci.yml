name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  check:
    name: fmt, clippy, test
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v5

      - name: Install the pinned toolchain
        run: rustup show active-toolchain || rustup toolchain install

      - uses: Swatinem/rust-cache@v2

      - run: cargo fmt --all -- --check

      - run: cargo clippy --workspace --all-targets -- -D warnings

      - run: cargo test --workspace

      # The screenshot path needs no display server, which is what makes it usable
      # as a CI gate. A non-zero exit or a missing file fails the job.
      - name: Render a frame
        run: |
          cargo run --release --quiet -- --screenshot frame.png --width 800 --height 600
          test -s frame.png
          file frame.png | grep -q 'PNG image data'

      - uses: actions/upload-artifact@v4
        with:
          name: frame
          path: frame.png

  supply-chain:
    name: deny, audit, notice
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v5

      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny,cargo-audit,cargo-about

      - run: cargo deny check

      - run: cargo audit

      # NOTICE is committed. If regenerating it produces a different file, the
      # dependency tree changed without the licence inventory being updated.
      - name: NOTICE is up to date
        run: |
          cargo about generate about.hbs -o NOTICE.generated
          diff -u NOTICE NOTICE.generated
